<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris - Arcade Zone</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#080818;
      color:#fff;
      font-family:'Press Start 2P', monospace;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }
    nav {
      width:100%;
      max-width:700px;
      margin-bottom:20px;
    }
    .back-btn {
      color:#4d96ff;
      text-decoration:none;
      font-size:10px;
      border:1px solid #4d96ff;
      padding:8px 14px;
      border-radius:6px;
      transition:background 0.2s;
    }
    .back-btn:hover { background:rgba(77,150,255,0.2); }
    h1 {
      color:#4d96ff;
      font-size:clamp(16px,3vw,24px);
      text-align:center;
      margin-bottom:20px;
      text-shadow:0 0 20px rgba(77,150,255,0.5);
    }
    .game-wrapper {
      display:flex;
      gap:20px;
      align-items:flex-start;
      flex-wrap:wrap;
      justify-content:center;
    }
    canvas {
      border:2px solid #1e3a6e;
      background:#000;
      box-shadow:0 0 30px rgba(77,150,255,0.3);
      border-radius:4px;
    }
    .side-panel {
      display:flex;
      flex-direction:column;
      gap:16px;
      min-width:140px;
    }
    .panel-box {
      background:#0d0d2b;
      border:1px solid #1e1e4a;
      border-radius:8px;
      padding:14px;
    }
    .panel-label {
      font-size:8px;
      color:#4d96ff;
      margin-bottom:10px;
      letter-spacing:1px;
    }
    .panel-value {
      font-size:16px;
      color:#fff;
    }
    #nextCanvas {
      background:#000;
      border:1px solid #1e1e4a;
      border-radius:4px;
    }
    .controls-box {
      background:#0d0d2b;
      border:1px solid #1e1e4a;
      border-radius:8px;
      padding:14px;
      font-size:8px;
      line-height:2.2;
      color:#8888aa;
    }
    .controls-box span { color:#4d96ff; }
    #overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
      z-index:10;
    }
    #overlay h2 { font-size:20px; color:#4d96ff; }
    #overlay p { font-size:10px; color:#aaa; }
    #overlay .big { font-size:28px; color:#fff; }
    .start-btn {
      background:#4d96ff;
      color:#000;
      border:none;
      padding:12px 24px;
      font-family:'Press Start 2P', monospace;
      font-size:12px;
      border-radius:8px;
      cursor:pointer;
      transition:filter 0.2s;
    }
    .start-btn:hover { filter:brightness(1.2); }
  </style>
</head>
<body>
<nav><a class="back-btn" href="index.html">&larr; BACK</a></nav>
<h1>TETRIS</h1>

<div class="game-wrapper">
  <canvas id="gameCanvas" width="300" height="600"></canvas>
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">SCORE</div>
      <div class="panel-value" id="scoreEl">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">LINES</div>
      <div class="panel-value" id="linesEl">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">LEVEL</div>
      <div class="panel-value" id="levelEl">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">NEXT</div>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
    <div class="controls-box">
      <span>← →</span> Move<br>
      <span>↑</span> Rotate<br>
      <span>↓</span> Soft drop<br>
      <span>Space</span> Hard drop<br>
      <span>P</span> Pause
    </div>
  </div>
</div>

<div id="overlay">
  <h2>TETRIS</h2>
  <p>Stack blocks &amp; clear lines!</p>
  <button class="start-btn" id="startBtn">START GAME</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');
const overlay = document.getElementById('overlay');

const COLS = 10, ROWS = 20, BLOCK = 30;
const COLORS = ['','#4d96ff','#ffd93d','#c77dff','#ff6b6b','#6bcb77','#ff9f43','#00d2ff'];

const PIECES = [
  null,
  [[1,1,1,1]],                          // I
  [[2,2],[2,2]],                         // O
  [[0,3,0],[3,3,3]],                     // T
  [[4,0],[4,0],[4,4]],                   // J
  [[0,5],[0,5],[5,5]],                   // L
  [[6,6,0],[0,6,6]],                     // S
  [[0,7,7],[7,7,0]],                     // Z
];

let board, score, lines, level, piece, pieceX, pieceY, nextPiece, gameRunning, paused, dropTimer, dropInterval;

function newBoard() {
  return Array.from({length:ROWS}, () => new Array(COLS).fill(0));
}

function randomPiece() {
  const id = Math.floor(Math.random()*7)+1;
  return PIECES[id].map(r=>[...r]);
}

function initGame() {
  board = newBoard();
  score = 0; lines = 0; level = 1;
  nextPiece = randomPiece();
  spawnPiece();
  gameRunning = true; paused = false;
  dropInterval = 800;
  updateUI();
}

function spawnPiece() {
  piece = nextPiece;
  nextPiece = randomPiece();
  pieceX = Math.floor((COLS - piece[0].length)/2);
  pieceY = 0;
  if (collides(piece, pieceX, pieceY)) { endGame(); }
  drawNext();
}

function collides(p, ox, oy) {
  for (let r=0; r<p.length; r++)
    for (let c=0; c<p[r].length; c++)
      if (p[r][c]) {
        const nx=ox+c, ny=oy+r;
        if (nx<0||nx>=COLS||ny>=ROWS||ny<0) return true;
        if (ny>=0 && board[ny][nx]) return true;
      }
  return false;
}

function rotate(p) {
  const rows=p.length, cols=p[0].length;
  const rotated=Array.from({length:cols},()=>new Array(rows).fill(0));
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++)
      rotated[c][rows-1-r]=p[r][c];
  return rotated;
}

function lock() {
  for (let r=0; r<piece.length; r++)
    for (let c=0; c<piece[r].length; c++)
      if (piece[r][c]) board[pieceY+r][pieceX+c] = piece[r][c];
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared=0;
  for (let r=ROWS-1; r>=0; r--) {
    if (board[r].every(v=>v)) {
      board.splice(r,1);
      board.unshift(new Array(COLS).fill(0));
      cleared++; r++;
    }
  }
  if (cleared) {
    const pts=[0,100,300,500,800];
    score += (pts[cleared]||1000)*level;
    lines += cleared;
    level = Math.floor(lines/10)+1;
    dropInterval = Math.max(100, 800-((level-1)*70));
    updateUI();
  }
}

function updateUI() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('linesEl').textContent = lines;
  document.getElementById('levelEl').textContent = level;
}

function drawBlock(context, x, y, color) {
  context.fillStyle = color;
  context.fillRect(x+1, y+1, BLOCK-2, BLOCK-2);
  context.fillStyle = 'rgba(255,255,255,0.25)';
  context.fillRect(x+1, y+1, BLOCK-2, 4);
  context.fillRect(x+1, y+1, 4, BLOCK-2);
  context.fillStyle = 'rgba(0,0,0,0.25)';
  context.fillRect(x+1, y+BLOCK-5, BLOCK-2, 4);
  context.fillRect(x+BLOCK-5, y+1, 4, BLOCK-2);
}

function drawGhost() {
  let gy = pieceY;
  while (!collides(piece, pieceX, gy+1)) gy++;
  if (gy === pieceY) return;
  for (let r=0; r<piece.length; r++)
    for (let c=0; c<piece[r].length; c++)
      if (piece[r][c]) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.strokeRect(pieceX*BLOCK+c*BLOCK+1, gy*BLOCK+r*BLOCK+1, BLOCK-2, BLOCK-2);
      }
}

function draw() {
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  for(let r=0;r<ROWS;r++){ ctx.beginPath();ctx.moveTo(0,r*BLOCK);ctx.lineTo(COLS*BLOCK,r*BLOCK);ctx.stroke(); }
  for(let c=0;c<COLS;c++){ ctx.beginPath();ctx.moveTo(c*BLOCK,0);ctx.lineTo(c*BLOCK,ROWS*BLOCK);ctx.stroke(); }
  // Board
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(board[r][c]) drawBlock(ctx, c*BLOCK, r*BLOCK, COLORS[board[r][c]]);
  // Ghost
  if(gameRunning&&!paused) drawGhost();
  // Current piece
  if(piece) {
    for(let r=0;r<piece.length;r++)
      for(let c=0;c<piece[r].length;c++)
        if(piece[r][c]) drawBlock(ctx, (pieceX+c)*BLOCK, (pieceY+r)*BLOCK, COLORS[piece[r][c]]);
  }
  if(paused) {
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#4d96ff';
    ctx.font='16px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText('PAUSED',canvas.width/2,canvas.height/2);
  }
}

function drawNext() {
  nctx.fillStyle='#000';
  nctx.fillRect(0,0,120,120);
  if(!nextPiece) return;
  const bsize=24;
  const offX = Math.floor((5-nextPiece[0].length)/2);
  const offY = Math.floor((5-nextPiece.length)/2);
  for(let r=0;r<nextPiece.length;r++)
    for(let c=0;c<nextPiece[r].length;c++)
      if(nextPiece[r][c]) {
        const color=COLORS[nextPiece[r][c]];
        nctx.fillStyle=color;
        nctx.fillRect((offX+c)*bsize+1,(offY+r)*bsize+1,bsize-2,bsize-2);
      }
}

function endGame() {
  gameRunning=false;
  overlay.innerHTML=`
    <h2>GAME OVER</h2>
    <p class="big">Score: ${score}</p>
    <p>Lines: ${lines} &nbsp; Level: ${level}</p>
    <button class="start-btn" onclick="startGame()">PLAY AGAIN</button>
  `;
  overlay.style.display='flex';
}

let lastTime=0;
function gameLoop(ts) {
  if(!gameRunning) return;
  const dt=ts-lastTime;
  if(!paused) {
    dropTimer+=dt;
    if(dropTimer>=dropInterval) {
      dropTimer=0;
      if(!collides(piece,pieceX,pieceY+1)) pieceY++;
      else lock();
    }
  }
  draw();
  lastTime=ts;
  requestAnimationFrame(gameLoop);
}

function startGame() {
  overlay.style.display='none';
  initGame();
  dropTimer=0; lastTime=0;
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e=>{
  if(!gameRunning) return;
  if(e.key==='p'||e.key==='P') { paused=!paused; return; }
  if(paused) return;
  switch(e.key) {
    case 'ArrowLeft':
      if(!collides(piece,pieceX-1,pieceY)) pieceX--;
      break;
    case 'ArrowRight':
      if(!collides(piece,pieceX+1,pieceY)) pieceX++;
      break;
    case 'ArrowDown':
      if(!collides(piece,pieceX,pieceY+1)) { pieceY++; score+=1; updateUI(); }
      break;
    case 'ArrowUp': {
      const r=rotate(piece);
      if(!collides(r,pieceX,pieceY)) piece=r;
      else if(!collides(r,pieceX-1,pieceY)) { piece=r; pieceX--; }
      else if(!collides(r,pieceX+1,pieceY)) { piece=r; pieceX++; }
      break;
    }
    case ' ': {
      e.preventDefault();
      let drop=0;
      while(!collides(piece,pieceX,pieceY+1)){ pieceY++; drop++; }
      score+=drop*2; updateUI();
      lock();
      break;
    }
  }
  draw();
});

document.getElementById('startBtn').onclick = startGame;
</script>
</body>
</html>
